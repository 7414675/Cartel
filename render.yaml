services:
  - type: web
    name: cartel
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: cartel-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
      - key: ADMIN_PHONE
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: APP_URL
        sync: false
