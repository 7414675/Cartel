<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartel - תיבת הדואר</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Thread list ──────────────────────────────────── */
      .thread-block {
        margin-bottom: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: white;
      }
      .thread-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.65rem 1rem;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }
      .thread-plate {
        font-weight: 700;
        font-size: 0.88rem;
        letter-spacing: 1.5px;
        direction: ltr;
        background: white;
        padding: 0.15rem 0.55rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      .thread-meta { font-size: 0.75rem; color: var(--text-muted); }

      /* ── Chat bubbles ──────────────────────────────────── */
      .bubble-list {
        padding: 0.85rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .bubble-row {
        display: flex;
        flex-direction: column;
        max-width: 75%;
      }
      /* RTL: flex-start = right side, flex-end = left side */
      .bubble-row.sent     { align-self: flex-start; align-items: flex-start; } /* my msgs → right */
      .bubble-row.received { align-self: flex-end;   align-items: flex-end;   } /* their msgs → left */
      .bubble {
        padding: 0.65rem 0.9rem;
        border-radius: 14px;
        font-size: 0.9rem;
        line-height: 1.55;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .bubble-row.sent .bubble {
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .bubble-row.received .bubble { background: #f1f5f9; border-bottom-left-radius: 4px; }
      .bubble-time {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
        padding: 0 0.25rem;
      }
.bubble-img { margin-top: 0.4rem; }
      .bubble-img img {
        max-width: 180px;
        border-radius: 8px;
        display: block;
        cursor: pointer;
      }

      /* ── Actions at bottom of thread box ──────────────── */
      .thread-actions {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.6rem 1rem;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      .btn-icon {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.3rem 0.5rem;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.15s;
        color: var(--text-muted);
      }
      .btn-icon:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
      .btn-icon.blocked { opacity: 0.4; cursor: not-allowed; }
      .btn-reply {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.3rem 0.75rem;
        background: var(--primary);
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 700;
        transition: background 0.15s;
      }
      .btn-reply:hover { background: var(--primary-dark); }

      /* ── Empty / title ────────────────────────────────── */
      .inbox-empty {
        text-align: center;
        color: var(--text-muted);
        padding: 2.5rem 0;
        font-size: 0.95rem;
      }
      .inbox-empty .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
      .inbox-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div>
          <h1><a href="/" style="color:inherit;text-decoration:none"><svg class="logo-icon" viewBox="0 0 36 43" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18,43 L12,33 A17,17 0,1,1 24,33 Z M7,11 H29 V15 H7 Z M9,19 H27 V23 H9 Z"/></svg>CarTel</a></h1>
          <p>text-the-plate</p>
        </div>
        <div class="header-nav">
          <a href="inbox.html" class="header-icon" title="תיבת הדואר">📬</a>
          <a href="profile.html" class="header-icon" title="הגדרות">⚙️</a>
        </div>
      </div>
    </header>

    <main>
      <div class="card">

        <!-- Not logged in -->
        <div id="authState" style="display:none">
          <div class="auth-gate">
            <p class="auth-gate-msg">עליך להיות מחובר כדי לראות את ההודעות שלך</p>
            <a href="/" class="btn-register">חזרה לדף הבית &larr;</a>
          </div>
        </div>

        <!-- Inbox -->
        <div id="inboxState" style="display:none">
          <div class="inbox-title-row">
            <h2>תיבת הדואר שלי</h2>
            <span id="threadCount" class="section-count"></span>
          </div>
          <div id="threadList"></div>
        </div>

      </div>
    </main>

    <footer>
      <a href="/" style="color:inherit">&larr; חזרה לדף הראשי</a>
      &nbsp;&bull;&nbsp;
      <a href="terms.html" style="color:inherit">תנאי שימוש</a>
      &nbsp;&bull;&nbsp;<a href="#" onclick="openContact();return false;" style="color:inherit">כתוב אלינו</a>
    </footer>

    <script src="/admin-bar.js"></script>
    <!-- Contact modal -->
    <div class="contact-modal-overlay" id="contactOverlay">
      <div class="contact-modal">
        <h3>כתוב אלינו</h3>
        <p>שלח הודעה לצוות CarTel — נחזור אליך בהקדם</p>
        <div class="form-group">
          <label for="contactName">שם <span class="optional-tag">אופציונלי</span></label>
          <input type="text" id="contactName" placeholder="ישראל ישראלי" maxlength="50" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="contactPhone">טלפון <span class="optional-tag">אופציונלי</span></label>
          <input type="tel" id="contactPhone" placeholder="050-000-0000" maxlength="15" dir="ltr" style="text-align:right" autocomplete="tel" />
        </div>
        <div class="form-group">
          <label for="contactMsg">הודעתך</label>
          <textarea id="contactMsg" placeholder="כתוב כאן..." maxlength="1000"></textarea>
        </div>
        <div class="contact-modal-footer">
          <button class="btn-cancel" onclick="closeContact()">ביטול</button>
          <button class="btn-register" id="contactSendBtn" onclick="sendContact()">שלח</button>
        </div>
        <div id="contactAlert" class="alert" style="margin-top:0.75rem"></div>
      </div>
    </div>
    <script>
      function openContact() {
        document.getElementById('contactOverlay').classList.add('open');
        // Pre-fill name/phone for logged-in users
        fetch('/api/me').then(r => r.ok ? r.json() : null).then(me => {
          if (!me) return;
          const n = document.getElementById('contactName');
          const p = document.getElementById('contactPhone');
          if (me.name  && !n.value) { n.value = me.name;  n.disabled = true; }
          if (me.phone && !p.value) { p.value = me.phone; p.disabled = true; }
        }).catch(()=>{});
      }
      function closeContact() {
        document.getElementById('contactOverlay').classList.remove('open');
        document.getElementById('contactMsg').value = '';
        const cn = document.getElementById('contactName');
        const cp = document.getElementById('contactPhone');
        cn.value = ''; cn.disabled = false;
        cp.value = ''; cp.disabled = false;
        const a = document.getElementById('contactAlert');
        a.className = 'alert'; a.textContent = '';
      }
      async function sendContact() {
        const msg = document.getElementById('contactMsg').value.trim();
        const btn = document.getElementById('contactSendBtn');
        const alertBox = document.getElementById('contactAlert');
        if (!msg) { alertBox.className = 'alert error'; alertBox.textContent = 'יש להזין הודעה'; return; }
        btn.disabled = true; btn.textContent = 'שולח...';
        try {
          const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
            message: msg,
            name: document.getElementById('contactName').value.trim(),
            phone: document.getElementById('contactPhone').value.trim(),
          }),
          });
          if (res.ok) {
            alertBox.className = 'alert success';
            alertBox.textContent = 'ההודעה נשלחה! נחזור אליך בהקדם.';
            btn.disabled = false; btn.textContent = 'שלח';
            setTimeout(closeContact, 2000);
          } else {
            const d = await res.json();
            alertBox.className = 'alert error'; alertBox.textContent = d.error;
            btn.disabled = false; btn.textContent = 'שלח';
          }
        } catch {
          alertBox.className = 'alert error'; alertBox.textContent = 'שגיאת רשת. נסה שוב.';
          btn.disabled = false; btn.textContent = 'שלח';
        }
      }
      document.getElementById('contactOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeContact();
      });
    </script>
    <script>
      function formatTime(iso) {
        const d    = new Date(iso);
        const diff = Date.now() - d;
        const mins  = Math.floor(diff / 60000);
        const hours = Math.floor(mins / 60);
        const days  = Math.floor(hours / 24);
        if (days > 6)  return d.toLocaleDateString('he-IL');
        if (days > 0)  return `לפני ${days} ימים`;
        if (hours > 0) return `לפני ${hours} שעות`;
        if (mins > 0)  return `לפני ${mins} דקות`;
        return 'עכשיו';
      }

      function formatPlate(plate) {
        if (!plate) return '';
        if (plate.length === 7) return plate.slice(0,2) + '-' + plate.slice(2,5) + '-' + plate.slice(5);
        if (plate.length === 8) return plate.slice(0,3) + '-' + plate.slice(3,5) + '-' + plate.slice(5);
        return plate;
      }

      function esc(text) {
        const d = document.createElement('div');
        d.textContent = text ?? '';
        return d.innerHTML;
      }

      let _userPhone = '';

      function renderThreads(userPhone, threads) {
        _userPhone = userPhone;
        const list = document.getElementById('threadList');
        const countEl = document.getElementById('threadCount');
        countEl.textContent = threads.length + ' שיחות';

        if (threads.length === 0) {
          list.innerHTML = `
            <div class="inbox-empty">
              <span class="empty-icon">📭</span>
              אין הודעות עדיין
            </div>`;
          return;
        }

        list.innerHTML = threads.map(msgs => {
          const plate   = msgs[0].plate;
          const lastMsg = msgs[msgs.length - 1];

          // Find the last received message that has a replyToken — actions go only there
          const lastReceived = [...msgs].reverse().find(m => m.senderPhone !== userPhone && m.replyToken);

          const bubblesHtml = msgs.map(m => {
            const isSent = m.senderPhone === userPhone;
            const side   = isSent ? 'sent' : 'received';

            const imgHtml = m.imageFile
              ? `<div class="bubble-img"><a href="/images/${esc(m.imageFile)}" target="_blank">
                   <img src="/images/${esc(m.imageFile)}" alt="תמונה מצורפת" />
                 </a></div>`
              : '';

            const phoneHtml = (!isSent && m.revealPhone && m.senderPhone)
              ? `<div class="bubble-phone" style="font-size:0.78rem;color:var(--primary);direction:ltr;margin-top:0.25rem">📞 ${esc(m.senderPhone)}</div>`
              : '';

            return `
              <div class="bubble-row ${side}">
                <div class="bubble">${esc(m.message)}${imgHtml}${phoneHtml}</div>
                <div class="bubble-time">${formatTime(m.sentAt)}</div>
              </div>`;
          }).join('');

          const threadActionsHtml = lastReceived ? `
            <div class="thread-actions">
              <button class="btn-icon" title="דווח על הודעה" onclick="reportMsg('${esc(lastReceived.id)}', this)">🚨</button>
              <button class="btn-icon" title="חסום שולח" onclick="blockSender('${esc(lastReceived.id)}', this)">🚫</button>
              <a href="/reply.html?token=${encodeURIComponent(lastReceived.replyToken)}" class="btn-reply">הגב &rarr;</a>
            </div>` : '';

          return `
            <div class="thread-block">
              <div class="thread-header">
                <span class="thread-plate">${esc(formatPlate(plate))}</span>
                <span class="thread-meta">${msgs.length} הודעות &bull; ${formatTime(lastMsg.sentAt)}</span>
              </div>
              <div class="bubble-list">${bubblesHtml}</div>
              ${threadActionsHtml}
            </div>`;
        }).join('');
      }

      async function init() {
        try {
          const inboxRes = await fetch('/api/inbox');
          if (inboxRes.status === 401) {
            document.getElementById('authState').style.display = 'block';
            return;
          }
          if (!inboxRes.ok) throw new Error('inbox error');
          const data = await inboxRes.json();
          document.getElementById('inboxState').style.display = 'block';
          renderThreads(data.userPhone, data.threads);
        } catch {
          document.getElementById('authState').style.display = 'block';
        }
      }

      async function reportMsg(msgId, btn) {
        if (!confirm('לדווח על הודעה זו כהודעה לא ראויה?')) return;
        btn.disabled = true;
        const res = await fetch(`/api/report/${msgId}`, { method: 'POST' });
        if (res.ok) { btn.textContent = '✅'; btn.title = 'דווח'; }
        else { btn.disabled = false; alert((await res.json()).error); }
      }

      async function blockSender(msgId, btn) {
        if (!confirm('לחסום שולח זה? הוא לא יוכל לשלוח לך הודעות יותר.')) return;
        btn.disabled = true;
        const res = await fetch(`/api/block/${msgId}`, { method: 'POST' });
        if (res.ok) { btn.textContent = '🚫'; btn.title = 'חסום'; btn.classList.add('blocked'); }
        else { btn.disabled = false; alert((await res.json()).error); }
      }

      init();
    </script>
  </body>
</html>
