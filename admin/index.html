<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartel - ניהול</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <a href="/" class="header-brand" style="text-decoration:none;color:inherit">
        <strong>Cartel</strong>
        <span>ממשק ניהול</span>
      </a>
      <div class="header-stats">
        <span class="stat-badge" id="statDrivers">...</span>
        <span class="stat-badge" id="statMessages">...</span>
      </div>
      <button class="btn-logout" onclick="logout()">התנתק</button>
    </header>

    <main class="admin-main">

      <!-- Drivers -->
      <section class="admin-section">
        <div class="section-head">
          <h2>נהגים רשומים</h2>
          <span class="section-count" id="driverCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>שם</th>
                <th>לוחית</th>
                <th>טלפון</th>
                <th>תאריך רישום</th>
                <th>פעולות</th>
              </tr>
            </thead>
            <tbody id="driversBody">
              <tr><td colspan="5" class="td-empty">טוען...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Messages -->
      <section class="admin-section">
        <div class="section-head">
          <h2>היסטוריית הודעות</h2>
          <span class="section-count" id="messageCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>לוחית</th>
                <th>הודעה</th>
                <th>תמונה</th>
                <th>טלפון שולח</th>
                <th>תאריך ושעה</th>
                <th>פעולות</th>
              </tr>
            </thead>
            <tbody id="messagesBody">
              <tr><td colspan="5" class="td-empty">טוען...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>

    <script>
      function esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function fmtDate(iso) {
        return new Date(iso).toLocaleString('he-IL', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      }

      async function load() {
        try {
          const [dr, mr] = await Promise.all([
            fetch('/admin/api/drivers'),
            fetch('/admin/api/messages'),
          ]);
          if (dr.status === 401) { window.location.href = '/admin/login'; return; }

          const drivers  = await dr.json();
          const messages = await mr.json();

          renderDrivers(drivers);
          renderMessages(messages);

          const dc = Object.keys(drivers).length;
          const mc = messages.length;
          document.getElementById('statDrivers').textContent  = `${dc} נהגים`;
          document.getElementById('statMessages').textContent = `${mc} הודעות`;
          document.getElementById('driverCount').textContent  = dc;
          document.getElementById('messageCount').textContent = mc;
        } catch (err) {
          console.error(err);
        }
      }

      function renderDrivers(drivers) {
        const tbody   = document.getElementById('driversBody');
        const entries = Object.entries(drivers);
        if (!entries.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="td-empty">אין נהגים רשומים</td></tr>';
          return;
        }
        tbody.innerHTML = entries
          .sort((a, b) => new Date(b[1].registeredAt) - new Date(a[1].registeredAt))
          .map(([plate, d]) => `
            <tr>
              <td>${esc(d.name || '—')}</td>
              <td class="td-plate">${esc(plate)}</td>
              <td dir="ltr" style="text-align:right">${esc(d.phone)}</td>
              <td>${fmtDate(d.registeredAt)}</td>
              <td><button class="btn-del" onclick="delDriver('${esc(plate)}')">מחק</button></td>
            </tr>
          `).join('');
      }

      function renderMessages(messages) {
        const tbody = document.getElementById('messagesBody');
        if (!messages.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="td-empty">אין הודעות בהיסטוריה</td></tr>';
          return;
        }
        tbody.innerHTML = [...messages].reverse().map(m => {
          const preview = m.message.length > 65
            ? esc(m.message.slice(0, 65)) + '...'
            : esc(m.message);
          const wa = (m.revealPhone && m.senderPhone) ? esc(m.senderPhone) : '—';
          const img = m.imageFile
            ? `<a href="/images/${esc(m.imageFile)}" target="_blank"><img src="/images/${esc(m.imageFile)}" style="height:36px;border-radius:4px;object-fit:cover;cursor:pointer" /></a>`
            : '—';
          return `
            <tr>
              <td class="td-plate">${esc(m.plate)}</td>
              <td class="td-msg" title="${esc(m.message)}">${preview}</td>
              <td>${img}</td>
              <td dir="ltr" style="text-align:right;font-size:0.82rem">${wa}</td>
              <td>${fmtDate(m.sentAt)}</td>
              <td><button class="btn-del" onclick="delMessage('${esc(m.id)}')">מחק</button></td>
            </tr>
          `;
        }).join('');
      }

      async function delDriver(plate) {
        if (!confirm(`מחק נהג רכב ${plate}?\n\nהנהג לא יקבל הודעות יותר. פעולה זו אינה הפיכה.`)) return;
        const res = await fetch(`/admin/api/drivers/${plate}`, { method: 'DELETE' });
        if (res.ok) load();
        else alert('שגיאה במחיקה');
      }

      async function delMessage(id) {
        if (!confirm('מחק הודעה זו? פעולה זו אינה הפיכה.')) return;
        const res = await fetch(`/admin/api/messages/${id}`, { method: 'DELETE' });
        if (res.ok) load();
        else alert('שגיאה במחיקה');
      }

      async function logout() {
        await fetch('/admin/api/logout', { method: 'POST' });
        window.location.href = '/admin/login';
      }

      load();
      setInterval(load, 30000);
    </script>
    <script src="/admin-bar.js"></script>
  </body>
</html>
